<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Καταγραφή Κτιρίου</title>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <style>
        /* Modern Dark Theme για το περιβάλλον εργασίας */
        body {
            background-color: #121212;
            color: #e0e0e0;
            font-family: Arial, Helvetica, sans-serif;
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .actions {
            margin-bottom: 15px;
            display: flex;
            gap: 10px;
            width: 100%;
            max-width: 794px; /* Pixel counter-part για Α4 σε 96 DPI */
        }

        button {
            flex: 1;
            background-color: #1f1f1f;
            color: #00adb5;
            border: 2px solid #00adb5;
            padding: 12px;
            font-size: 15px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s ease;
            -webkit-tap-highlight-color: transparent;
        }

        button:hover {
            background-color: #00adb5;
            color: #121212;
            box-shadow: 0 0 10px #00adb5;
        }

        /* Responsive Container */
        .scroll-container {
            width: 100%;
            overflow-x: auto;
            display: flex;
            justify-content: flex-start;
        }

        /* Το έντυπο - Βελτιστοποιημένο για html2canvas και Α4 */
        #document-page {
            background-color: #ffffff;
            color: #000000;
            width: 794px; /* 210mm σε standard web ανάλυση */
            min-height: 1123px; /* 297mm σε standard web ανάλυση */
            padding: 40px;
            box-sizing: border-box;
            border: 1px solid #333;
            flex-shrink: 0;
            position: relative;
        }

        /* Όλα τα πεδία κεντραρισμένα */
        input[type="text"], textarea {
            border: 1px solid #000;
            background: transparent;
            color: #000;
            padding: 4px;
            font-size: 14px;
            font-family: Arial, Helvetica, sans-serif;
            width: 100%;
            box-sizing: border-box;
            text-align: center;
        }

        .header-box {
            border: 2px solid #000;
            padding: 8px;
            margin-bottom: 20px;
        }

        .header-row {
            display: flex;
            margin-bottom: 8px;
            align-items: center;
        }
        .header-row:last-child { margin-bottom: 0; }

        .header-row label {
            font-weight: bold;
            font-size: 13px;
            white-space: nowrap;
            margin-right: 5px;
        }

        .header-row input {
            border: none;
            border-bottom: 1px solid #000;
            text-align: left;
        }

        /* Δομή Ορόφων */
        .floors-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            column-gap: 40px;
            row-gap: 8px;
            margin-bottom: 20px;
        }

        .floor-item {
            display: flex;
            flex-direction: column;
        }

        .floor-item label {
            font-weight: bold;
            font-size: 12px;
            margin-bottom: 2px;
        }

        .floor-item .box {
            border: 2px solid #000;
            height: 42px;
        }

        .floor-item .box input {
            height: 100%;
            border: none;
            font-size: 15px;
            font-weight: bold;
        }

        /* Κάτω Μέρος */
        .bottom-container {
            display: grid;
            grid-template-columns: 1.1fr 0.9fr;
            column-gap: 40px;
        }

        .totals-side, .info-side {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .inline-field {
            display: flex;
            align-items: center;
            font-size: 12px;
            font-weight: bold;
        }
        .inline-field label { white-space: nowrap; margin-right: 5px; }
        .inline-field input { border: none; border-bottom: 1px solid #000; width: 100%; }

        /* Πίνακες */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 12px;
            font-size: 12px;
            text-align: center;
        }

        table, th, td {
            border: 1px solid #000;
        }

        th, td {
            padding: 3px;
            height: 20px;
        }

        th { font-weight: bold; background-color: #f5f5f5; }
        td input { border: none !important; text-align: center; height: 100%; font-weight: bold; }

        /* Splitter */
        .splitter-row {
            display: flex;
            gap: 12px;
            font-size: 12px;
            font-weight: bold;
            align-items: center;
            margin-top: 4px;
        }
        .splitter-row input { width: 45px; border: none; border-bottom: 1px solid #000; text-align: center; }

        /* Παρατηρήσεις */
        .observations {
            margin-top: 12px;
            display: flex;
            flex-direction: column;
            font-weight: bold;
            font-size: 12px;
        }
        .observations textarea {
            width: 100%;
            height: 55px;
            border: 1px solid #000;
            margin-top: 4px;
            resize: none;
            padding: 4px;
            text-align: center;
        }

        /* Αναδυόμενο Παράθυρο (Modal) */
        .custom-modal {
            display: none;
            position: fixed;
            z-index: 9999;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.95);
            justify-content: center;
            align-items: center;
            flex-direction: column;
            padding: 10px;
            box-sizing: border-box;
        }
        .custom-modal img {
            max-width: 100%;
            max-height: 75vh;
            border: 2px solid #00adb5;
            border-radius: 4px;
            object-fit: contain;
        }
        .custom-modal p {
            color: #fff;
            font-size: 15px;
            text-align: center;
            margin: 15px 0;
            font-weight: bold;
        }
        .custom-modal .close-btn {
            background: #00adb5;
            color: #121212;
            border: none;
            padding: 12px 25px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
        }

        /* Ρυθμίσεις Εκτύπωσης - Επιβολή πραγματικού Α4 */
        @media print {
            @page {
                size: A4;
                margin: 0;
            }
            body {
                background: #fff;
                padding: 0;
            }
            .actions, .custom-modal {
                display: none !important;
            }
            .scroll-container {
                overflow: visible;
            }
            #document-page {
                border: none;
                box-shadow: none;
                padding: 10mm;
                width: 210mm;
                height: 297mm;
            }
        }
    </style>
</head>
<body>

    <div class="actions">
        <button onclick="window.print()">Εκτύπωση / PDF</button>
        <button onclick="saveAsImage()">Αποθήκευση ως Εικόνα</button>
    </div>

    <div class="scroll-container">
        <div id="document-page">
            <div class="header-box">
                <div class="header-row">
                    <label>ΔΙΕΥΘΥΝΣΗ:</label>
                    <input type="text" style="text-align: left;">
                </div>
                <div class="header-row" style="justify-content: space-between;">
                    <div style="display:flex; width: 50%; align-items:center;">
                        <label>ΟΡΟΦΟΣ ΠΕΛΑΤΗ:</label>
                        <input type="text">
                    </div>
                    <div style="display:flex; width: 45%; align-items:center;">
                        <label>Building Id:</label>
                        <input type="text">
                    </div>
                </div>
            </div>

            <div class="floors-container">
                <div class="floor-item"><label>ΥΠΟΓΕΙΟ</label><div class="box"><input type="text"></div></div>
                <div class="floor-item"><label>ΗΜΙΥΠΟΓΕΙΟ</label><div class="box"><input type="text"></div></div>
                <div class="floor-item"><label>ΙΣΟΓΕΙΟ</label><div class="box"><input type="text"></div></div>
                <div class="floor-item"><label>ΗΜΙΟΡΟΦΟΣ</label><div class="box"><input type="text"></div></div>
                <div class="floor-item"><label>1ΟΣ ΟΡΟΦΟΣ</label><div class="box"><input type="text"></div></div>
                <div class="floor-item"><label>2ΟΣ ΟΡΟΦΟΣ</label><div class="box"><input type="text"></div></div>
                <div class="floor-item"><label>3ΟΣ ΟΡΟΦΟΣ</label><div class="box"><input type="text"></div></div>
                <div class="floor-item"><label>4ΟΣ ΟΡΟΦΟΣ</label><div class="box"><input type="text"></div></div>
                <div class="floor-item"><label>5ΟΣ ΟΡΟΦΟΣ</label><div class="box"><input type="text"></div></div>
                <div class="floor-item"><label>6ΟΣ ΟΡΟΦΟΣ</label><div class="box"><input type="text"></div></div>
                <div class="floor-item"><label>7ΟΣ ΟΡΟΦΟΣ</label><div class="box"><input type="text"></div></div>
                <div class="floor-item"><label>8ΟΣ ΟΡΟΦΟΣ</label><div class="box"><input type="text"></div></div>
            </div>

            <div class="bottom-container">
                <div class="totals-side">
                    <div class="inline-field"><label>ΣΥΝΟΛΟ ΔΙΑΜΕΡΙΣΜΑΤΩΝ:</label><input type="text"></div>
                    <div class="inline-field"><label>ΣΥΝΟΛΟ ΚΑΤΑΣΤΗΜΑΤΩΝ:</label><input type="text"></div>
                    <div class="inline-field"><label>ΣΥΝΟΛΟ ΧΩΡΩΝ:</label><input type="text"></div>
                    <div class="inline-field"><label>ΣΥΝΟΛΟ ΟΡΟΦΩΝ/ΕΠΙΠΕΔΩΝ:</label><input type="text"></div>

                    <table>
                        <tr><th>BCP</th><th>RAYCAP</th><th>ZTT</th><th>CANNOVATE</th></tr>
                        <tr><td>SMALL</td><td><input type="text"></td><td><input type="text"></td><td><input type="text"></td></tr>
                        <tr><td>MEDIUM</td><td><input type="text"></td><td><input type="text"></td><td><input type="text"></td></tr>
                    </table>

                    <table>
                        <tr><th>BEP</th><th>RAYCAP</th><th>ZTT</th><th>CANNOVATE</th></tr>
                        <tr><td>SMALL</td><td><input type="text"></td><td><input type="text"></td><td><input type="text"></td></tr>
                        <tr><td>MEDIUM</td><td><input type="text"></td><td><input type="text"></td><td><input type="text"></td></tr>
                        <tr><td>LARGE</td><td><input type="text"></td><td><input type="text"></td><td><input type="text"></td></tr>
                        <tr><td>XLARGE</td><td><input type="text"></td><td><input type="text"></td><td><input type="text"></td></tr>
                    </table>

                    <table>
                        <tr><th>BMO</th><th>RAYCAP</th><th>ZTT</th><th>CANNOVATE</th><th>ΠΟΣΟΤΗΤΑ</th></tr>
                        <tr><td>SMALL</td><td><input type="text"></td><td><input type="text"></td><td><input type="text"></td><td><input type="text"></td></tr>
                        <tr><td>MEDIUM</td><td><input type="text"></td><td><input type="text"></td><td><input type="text"></td><td><input type="text"></td></tr>
                        <tr><td>LARGE</td><td><input type="text"></td><td><input type="text"></td><td><input type="text"></td><td><input type="text"></td></tr>
                        <tr><td>XLARGE</td><td><input type="text"></td><td><input type="text"></td><td><input type="text"></td><td><input type="text"></td></tr>
                    </table>
                </div>

                <div class="info-side">
                    <div class="inline-field"><label>SR ID:</label><input type="text"></div>
                    <div style="font-size: 12px; font-weight: bold; margin-top: 4px;">ΣΥΝΤΕΤΑΓΜΕΝΕΣ ΚΤΙΡΙΟΥ:</div>
                    <div class="inline-field" style="padding-left: 15px;"><label>X:</label><input type="text"></div>
                    <div class="inline-field" style="padding-left: 15px;"><label>Y:</label><input type="text"></div>

                    <div class="splitter-row">
                        <span>SPLITTER:</span>
                        <label>1:8</label><input type="text">
                        <label>1:2</label><input type="text">
                    </div>

                    <div class="inline-field" style="margin-top: 4px;"><label>ΚΑΜΠΙΝΑ:</label><input type="text"></div>
                    <div class="inline-field"><label>ΑΝΑΜΟΝΗ:</label><input type="text"></div>

                    <table style="margin-top: 20px;">
                        <tr><th>FLOORBOX</th><th>2 Drop</th><th>4 Drop</th><th>6 Drop</th><th>12 Drop</th></tr>
                        <tr><td><strong>ΠΟΣΟΤΗΤΑ</strong></td><td><input type="text"></td><td><input type="text"></td><td><input type="text"></td><td><input type="text"></td></tr>
                    </table>

                    <div class="observations">
                        <label>ΠΑΡΑΤΗΡΗΣΕΙΣ:</label>
                        <textarea id="obs-text"></textarea>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="imageModal" class="custom-modal">
        <img id="modalImage" src="" alt="Έγγραφο">
        <p>Κρατήστε πατημένη την εικόνα για αποθήκευση</p>
        <button class="close-btn" onclick="closeModal()">Πίσω στη Φόρμα</button>
    </div>

    <script>
        function saveAsImage() {
            const element = document.getElementById('document-page');
            
            // "Κλείδωμα" των τιμών για να μην βγαίνουν κενές οι εισαγωγές
            const inputs = element.querySelectorAll('input[type="text"], textarea');
            inputs.forEach(input => {
                input.setAttribute('value', input.value);
                if(input.tagName.toLowerCase() === 'textarea') {
                    input.innerText = input.value;
                }
            });

            // Ρυθμίσεις συμβατές με mobile browsers
            const options = {
                scale: 2, 
                useCORS: true,
                allowTaint: true,
                backgroundColor: '#ffffff',
                width: 794,
                height: 1123
            };

            // Δίνουμε χρόνο στον browser να κάνει render
            setTimeout(() => {
                html2canvas(element, options).then(canvas => {
                    const imgData = canvas.toDataURL('image/png');
                    
                    // Εμφάνιση στο Modal για όλες τις συσκευές για σιγουριά
                    document.getElementById('modalImage').src = imgData;
                    document.getElementById('imageModal').style.display = 'flex';
                }).catch(err => {
                    alert("Παρουσιάστηκε σφάλμα. Δοκιμάστε να τραβήξετε screenshot.");
                });
            }, 200);
        }

        function closeModal() {
            document.getElementById('imageModal').style.display = 'none';
        }
    </script>
</body>
</html>
